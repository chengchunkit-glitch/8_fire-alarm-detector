<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眼聽八方 (Eye-Hear) 👀</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f0f0; transition: background-color 0.3s ease; }
        #container { text-align: center; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 95%; width: 480px; box-sizing: border-box; margin: 20px 0; overflow: hidden; }
        h1 { color: #333; margin-top: 0; font-size: 26px; font-weight: 800;}
        p { color: #666; font-size: 14px; margin-bottom: 15px;}
        
        /* 狀態與跑馬燈區塊 */
        #status-container { margin: 15px 0; min-height: 60px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 8px; }
        #status { font-size: 20px; font-weight: bold; color: #555; width: 100%; }
        
        /* 跑馬燈與閃爍動畫設定 */
        .marquee-mode { 
            white-space: nowrap;
            font-size: 40px !important; /* 超大字體 */
            font-weight: 900 !important;
            display: inline-block;
            padding-left: 100%; /* 從最右邊開始 */
            animation: marqueeScroll 4s linear infinite, textFlash 0.3s infinite alternate; 
        }

        @keyframes marqueeScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        @keyframes textFlash {
            from { opacity: 1; text-shadow: 0px 0px 10px rgba(255,255,255,0.8); }
            to { opacity: 0.6; text-shadow: 0px 0px 20px currentColor; }
        }
        
        /* 控制面板區 */
        .control-panel { background-color: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 15px; text-align: left; border: 1px solid #e9ecef; }
        .control-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: #495057; font-size: 15px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex-grow: 1; cursor: pointer; height: 20px; }
        .debug-volume { background: #e3f2fd; padding: 8px; border-radius: 8px; margin-top: 10px; font-size: 14px; font-weight: bold; color: #0277bd; display: flex; justify-content: space-between;}
        
        /* 語音翻譯顯示區 */
        .transcript-box { background-color: #2c3e50; color: #ecf0f1; border-radius: 10px; padding: 15px; margin-bottom: 15px; min-height: 60px; text-align: left; font-size: 15px;}
        .transcript-label { font-size: 12px; color: #95a5a6; margin-bottom: 5px; font-weight: bold; }
        #interimText { color: #bdc3c7; font-style: italic; } 
        #finalText { font-weight: bold; color: #fff; } 
        
        /* 進度條區 */
        .progress-section { text-align: left; margin-bottom: 20px;}
        .progress-label { font-size: 14px; color: #333; margin-bottom: 6px; font-weight: bold; display: flex; justify-content: space-between;}
        .progress-container { width: 100%; height: 16px; background-color: #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
        
        #fireProgressBar { height: 100%; width: 0%; background-color: #f44336; transition: width 0.1s linear; }
        #carProgressBar { height: 100%; width: 0%; background-color: #2196f3; transition: width 0.1s linear; }
        #doorbellProgressBar { height: 100%; width: 0%; background-color: #9c27b0; transition: width 0.1s linear; }
        #nameProgressBar { height: 100%; width: 0%; background-color: #ff9800; transition: width 0.2s ease-out; }
        
        button { padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 10px; transition: 0.2s; width: 100%; }
        button:hover { background-color: #0056b3; }
        button.stop { background-color: #dc3545; }
        
        /* 警報全螢幕閃爍動畫 */
        .alert-fire { animation: flashFire 0.6s infinite alternate; }
        .alert-car { animation: flashCar 0.6s infinite alternate; }
        .alert-doorbell { animation: flashDoorbell 0.5s infinite alternate; } 
        .alert-name { animation: flashName 0.4s infinite alternate; } 
        
        @keyframes flashFire { from { background-color: #ffcccc; } to { background-color: #ff0000; } }
        @keyframes flashCar { from { background-color: #bbdefb; } to { background-color: #1976d2; } }
        @keyframes flashDoorbell { from { background-color: #e1bee7; } to { background-color: #9c27b0; } }
        @keyframes flashName { from { background-color: #ffe0b2; } to { background-color: #ff9800; } }
    </style>
</head>
<body>
    <div id="container">
        <h1>👀 眼聽八方 (Eye-Hear)</h1>
        <p>專屬視覺化聽覺輔助系統：火警 / 汽車 / 門鐘 / 語音呼叫</p>
        
        <div class="control-panel">
            <div class="control-header">
                <span>環境聲音觸發門檻</span>
                <span id="thresholdValue" style="color:#007bff">80</span>
            </div>
            <div class="slider-container">
                <span style="font-size: 12px; color: #888;">靈敏</span>
                <input type="range" id="thresholdSlider" min="10" max="150" value="80">
                <span style="font-size: 12px; color: #888;">遲鈍</span>
            </div>
            <div class="debug-volume">
                <span>🎤 當前音量：<span id="currentVolumeDisplay">0</span></span>
                <span>🎧 頻率：<span id="hzDisplay">0</span> Hz</span>
            </div>
        </div>

        <div class="transcript-box">
            <div class="transcript-label">🤖 AI 語音即時翻譯 (廣東話)：</div>
            <span id="finalText"></span>
            <span id="interimText">等待聲音輸入...</span>
        </div>

        <div class="progress-section">
            <div class="progress-label"><span>🔥 火警鐘聲 (>1800Hz)</span></div>
            <div class="progress-container"><div id="fireProgressBar"></div></div>
            
            <div class="progress-label"><span>🚗 汽車喇叭 (300~800Hz)</span></div>
            <div class="progress-container"><div id="carProgressBar"></div></div>

            <div class="progress-label"><span>🚪 門鐘叮噹 (800~1800Hz)</span></div>
            <div class="progress-container"><div id="doorbellProgressBar"></div></div>

            <div class="progress-label"><span>🗣️ 呼叫名字 (AI 辨識 "俊傑" 等)</span></div>
            <div class="progress-container"><div id="nameProgressBar"></div></div>
        </div>

        <div id="status-container">
            <div id="status">系統待命準備中...</div>
        </div>

        <button id="toggleBtn">開始運作</button>
    </div>

    <script>
        // --- 變數宣告 ---
        let audioContext;
        let analyser;
        let microphone;
        let isListening = false;
        let animationId;
        let alarmTriggered = false;
        
        let VOLUME_THRESHOLD = 80;           
        const WINDOW_SIZE_MS = 6000;           
        
        const REQUIRED_FIRE_MS = 3500;     // 火警需要持續 3.5 秒
        const REQUIRED_CAR_MS = 1500;      // 汽車喇叭持續 1.5 秒
        const REQUIRED_DOORBELL_MS = 1500; // 門鐘持續 1.5 秒
        let nameProgress = 0;              // 語音辨識的進度

        let soundHistory = []; 
        let lastFrameTime = 0; 

        // 🚨 設定要觸發警報的關鍵字 (已加入日常實用字眼)
        const NAME_KEYWORDS = ["俊傑", "衰仔", "死仔", "聽話", "食飯", "過嚟", "幫手"];

        // --- 取得 HTML 元素 ---
        const toggleBtn = document.getElementById('toggleBtn');
        const statusDiv = document.getElementById('status');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdValueDisplay = document.getElementById('thresholdValue');
        const currentVolumeDisplay = document.getElementById('currentVolumeDisplay');
        const hzDisplaySpan = document.getElementById('hzDisplay');
        
        const fireProgressBar = document.getElementById('fireProgressBar');
        const carProgressBar = document.getElementById('carProgressBar');
        const doorbellProgressBar = document.getElementById('doorbellProgressBar');
        const nameProgressBar = document.getElementById('nameProgressBar');
        
        const finalTextSpan = document.getElementById('finalText');
        const interimTextSpan = document.getElementById('interimText');

        // --- AI 語音引擎設定 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;       
            recognition.interimResults = true;   
            recognition.lang = 'yue-Hant-HK';    

            recognition.onresult = (event) => {
                if (alarmTriggered) return;

                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }

                if (finalTranscript) finalTextSpan.textContent = finalTranscript + ' ';
                interimTextSpan.textContent = interimTranscript;

                // 檢查是否包含關鍵字
                const combinedText = finalTranscript + interimTranscript;
                let foundKeyword = NAME_KEYWORDS.some(keyword => combinedText.includes(keyword));
                
                if (foundKeyword) {
                    nameProgress = 100;
                    nameProgressBar.style.width = '100%';
                    triggerAlarm('name');
                }
            };

            recognition.onerror = (e) => { console.warn("語音辨識錯誤:", e.error); };
            
            recognition.onend = () => {
                if (isListening && recognition) {
                    try { recognition.start(); } catch(e){}
                }
            };
        } else {
            interimTextSpan.textContent = "您的瀏覽器不支援 AI 語音辨識，請使用 Chrome。";
        }

        // --- 自動讀取音量設定 ---
        const savedThreshold = localStorage.getItem('alarmThreshold');
        if (savedThreshold) {
            VOLUME_THRESHOLD = parseInt(savedThreshold, 10);
            thresholdSlider.value = VOLUME_THRESHOLD;
            thresholdValueDisplay.textContent = VOLUME_THRESHOLD;
        }

        thresholdSlider.addEventListener('input', (event) => {
            VOLUME_THRESHOLD = parseInt(event.target.value, 10);
            thresholdValueDisplay.textContent = VOLUME_THRESHOLD;
            localStorage.setItem('alarmThreshold', VOLUME_THRESHOLD); 
        });

        // --- 按鈕邏輯 ---
        toggleBtn.addEventListener('click', async () => {
            if (isListening) stopListening();
            else await startListening();
        });

        async function startListening() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContextClass();
                await audioContext.resume();
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024; 
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                if (recognition) {
                    finalTextSpan.textContent = '';
                    interimTextSpan.textContent = '';
                    try { recognition.start(); } catch(e){}
                }

                isListening = true;
                alarmTriggered = false;
                soundHistory = [];
                lastFrameTime = Date.now();
                nameProgress = 0;
                
                fireProgressBar.style.width = '0%'; 
                carProgressBar.style.width = '0%';
                doorbellProgressBar.style.width = '0%';
                nameProgressBar.style.width = '0%';
                
                toggleBtn.textContent = '停止運作';
                toggleBtn.classList.add('stop');
                
                resetStatusText('🟢 雙引擎運作中...');
                document.body.classList.remove('alert-fire', 'alert-car', 'alert-doorbell', 'alert-name');

                detectSound(); 
            } catch (err) {
                alert('無法存取麥克風。請確認已允許權限！');
            }
        }

        function stopListening() {
            isListening = false;
            if (audioContext && audioContext.state !== 'closed') audioContext.close();
            cancelAnimationFrame(animationId);
            if (recognition) { try { recognition.stop(); } catch(e){} }
            
            toggleBtn.textContent = '開始運作';
            toggleBtn.classList.remove('stop');
            
            resetStatusText('系統待命準備中...');
            document.body.classList.remove('alert-fire', 'alert-car', 'alert-doorbell', 'alert-name');
            currentVolumeDisplay.textContent = '0';
            hzDisplaySpan.textContent = '0';
            
            fireProgressBar.style.width = '0%';
            carProgressBar.style.width = '0%';
            doorbellProgressBar.style.width = '0%';
            nameProgressBar.style.width = '0%';
        }

        // --- 物理頻率偵測邏輯 (負責火警、門鐘、汽車) ---
        function detectSound() {
            if (!isListening) return;

            const now = Date.now();
            const delta = now - lastFrameTime; 
            lastFrameTime = now;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            let maxEnergy = 0;
            let maxIndex = 0;

            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
                if (dataArray[i] > maxEnergy) {
                    maxEnergy = dataArray[i];
                    maxIndex = i; 
                }
            }
            
            let averageVolume = sum / bufferLength;
            currentVolumeDisplay.textContent = Math.round(averageVolume);
            
            const isLoud = averageVolume > VOLUME_THRESHOLD;
            let detectedType = 'none';

            if (isLoud) {
                const sampleRate = audioContext.sampleRate; 
                const binWidth = sampleRate / analyser.fftSize;
                const dominantFreq = Math.round(maxIndex * binWidth);
                hzDisplaySpan.textContent = dominantFreq;

                if (dominantFreq > 1800) { 
                    detectedType = 'fire'; 
                } else if (dominantFreq >= 800 && dominantFreq <= 1800) { 
                    detectedType = 'doorbell';  
                } else if (dominantFreq >= 300 && dominantFreq < 800) { 
                    detectedType = 'car';  
                }
            } else {
                hzDisplaySpan.textContent = '0';
            }

            soundHistory.push({ time: now, duration: delta, type: detectedType });
            soundHistory = soundHistory.filter(item => (now - item.time) <= WINDOW_SIZE_MS);

            let fireTime = 0, carTime = 0, doorbellTime = 0;
            for (let item of soundHistory) {
                if (item.type === 'fire') fireTime += item.duration;
                if (item.type === 'car') carTime += item.duration;
                if (item.type === 'doorbell') doorbellTime += item.duration;
            }

            if (!alarmTriggered) {
                fireProgressBar.style.width = Math.min((fireTime / REQUIRED_FIRE_MS) * 100, 100) + '%';
                carProgressBar.style.width = Math.min((carTime / REQUIRED_CAR_MS) * 100, 100) + '%';
                doorbellProgressBar.style.width = Math.min((doorbellTime / REQUIRED_DOORBELL_MS) * 100, 100) + '%';
            }

            if (!alarmTriggered) {
                if (fireTime >= REQUIRED_FIRE_MS) triggerAlarm('fire');
                else if (doorbellTime >= REQUIRED_DOORBELL_MS) triggerAlarm('doorbell');
                else if (carTime >= REQUIRED_CAR_MS) triggerAlarm('car');
            }

            animationId = requestAnimationFrame(detectSound);
        }

        // --- 恢復正常文字顯示 ---
        function resetStatusText(text) {
            statusDiv.className = ''; // 移除跑馬燈 class
            statusDiv.style.color = '#555';
            statusDiv.innerHTML = text;
        }

        // --- 觸發走馬燈警報 ---
        function triggerAlarm(alarmType) {
            alarmTriggered = true;
            document.body.classList.remove('alert-fire', 'alert-car', 'alert-doorbell', 'alert-name');
            statusDiv.className = 'marquee-mode'; // 套用跑馬燈與大字體特效

            if (alarmType === 'fire') {
                statusDiv.style.color = '#d32f2f';
                statusDiv.innerHTML = '🚨 危險，火警！速逃 🚨';
                document.body.classList.add('alert-fire');
                fireProgressBar.style.width = '100%';
                if ('vibrate' in navigator) navigator.vibrate([1000, 500, 1000, 500, 2000]);
            } 
            else if (alarmType === 'doorbell') {
                statusDiv.style.color = '#6a1b9a';
                statusDiv.innerHTML = '🔔 有人㩒門鐘！ 🔔';
                document.body.classList.add('alert-doorbell');
                doorbellProgressBar.style.width = '100%';
                if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
            }
            else if (alarmType === 'car') {
                statusDiv.style.color = '#1976d2';
                statusDiv.innerHTML = '🚗 小心，有車！ 🚗';
                document.body.classList.add('alert-car');
                carProgressBar.style.width = '100%';
                if ('vibrate' in navigator) navigator.vibrate([400, 200, 400]);
            }
            else if (alarmType === 'name') {
                statusDiv.style.color = '#e65100';
                statusDiv.innerHTML = '🗣️ 有人叫你啦！ 🗣️';
                document.body.classList.add('alert-name');
                nameProgressBar.style.width = '100%';
                if ('vibrate' in navigator) navigator.vibrate([300, 100, 300, 100, 500]);
            }

            soundHistory = [];

            setTimeout(() => {
                alarmTriggered = false;
                lastFrameTime = Date.now(); 
                nameProgress = 0;
                fireProgressBar.style.width = '0%'; 
                carProgressBar.style.width = '0%'; 
                doorbellProgressBar.style.width = '0%';
                nameProgressBar.style.width = '0%'; 
                finalTextSpan.textContent = '';
                interimTextSpan.textContent = '等待聲音輸入...';
                
                if (isListening) {
                   resetStatusText('🟢 雙引擎運作中...');
                   document.body.classList.remove('alert-fire', 'alert-car', 'alert-doorbell', 'alert-name');
                }
            }, 6000);
        }
    </script>
</body>
</html>
